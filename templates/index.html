<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📔 Daily Journal</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/entries">Entries</a></li>
                <li><a href="/stats">Statistics</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>Welcome to Your Daily Journal</h1>
            <p>Track your thoughts, reflections, and mood</p>
            
            <div class="quick-stats">
                <div class="stat-card" id="stat-total">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Total Entries</div>
                </div>
                <div class="stat-card" id="stat-mood">
                    <div class="stat-number">0.0</div>
                    <div class="stat-label">Average Mood</div>
                </div>
                <div class="stat-card" id="stat-last">
                    <div class="stat-number">-</div>
                    <div class="stat-label">Last Entry</div>
                </div>
            </div>
        </section>
        
        <section class="create-entry">
            <h2>Create New Entry</h2>
            <form id="entry-form" class="entry-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g., Today was amazing">
                </div>
                
                <div class="form-group">
                    <label for="mood">Mood (1-10)</label>
                    <div class="mood-selector">
                        <input type="range" id="mood" name="mood" min="1" max="10" value="5">
                        <span id="mood-display">5</span>
                        <span id="mood-emoji">😐</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" name="content" placeholder="Write your thoughts here..." rows="6"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" name="tags" placeholder="e.g., work, personal, goals">
                </div>
                
                <button type="submit" class="btn btn-primary">Save Entry</button>
            </form>
        </section>
        
        <section class="recent-entries">
            <h2>Recent Entries</h2>
            <div id="recent-list" class="entries-list">
                <p class="loading">Loading entries...</p>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
